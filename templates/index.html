<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Summarizer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-extrabold text-indigo-600 mb-2 flex items-center gap-2">
    <svg class="w-8 h-8 text-red-600 animate-spin-[spinning_3s_linear_infinite]" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="3"/>
        <circle cx="12" cy="7" r="1.5"/>
        <circle cx="7" cy="14.5" r="1.5"/>
        <circle cx="17" cy="14.5" r="1.5"/>
        <path d="M12 7 C 14 7, 15 9, 15 12 M7 14.5 C 8 16, 10 16, 12 15 M17 14.5 C 16 13, 14 12, 12 12" stroke="currentColor" stroke-width="1" fill="none"/>
    </svg>
    AI Content Summarizer
</h1>
        <p class="text-slate-500 mb-6">Paste long articles, essays, or notes to get a concise, smart summary instantly.</p>

        <form action="/summarize" method="POST" class="space-y-4">
            <textarea 
                name="text_to_summarize" 
                rows="8" 
                class="w-full p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none resize-none" 
                placeholder="Paste your long text here..." 
                required></textarea>
            
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-semibold text-slate-600">Select Summary Length:</label>
                <select name="summary_length" class="w-full p-3 border border-slate-200 rounded-xl bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    <option value="short">Short & Crisp (3 bullet points)</option>
                    <option value="medium" selected>Medium (Detailed bullet points)</option>
                    <option value="long">Detailed Paragraph (Deep dive summary)</option>
                </select>
            </div>
            
            <button 
                type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition duration-200 shadow-md shadow-indigo-200">
                Generate Summary
            </button>
        </form>

        {% if summary %}
        <div class="mt-8 p-6 bg-indigo-50/50 border border-indigo-100 rounded-xl relative">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-xl font-bold text-indigo-900">Key Summary Points:</h2>
                
                <div class="flex gap-2">
                    <button 
                        id="copyBtn"
                        onclick="copyToClipboard()"
                        class="text-xs bg-white border border-slate-200 text-slate-600 font-semibold py-1.5 px-3 rounded-lg hover:bg-slate-50 cursor-pointer transition">
                        📋 Copy
                    </button>
                    <button 
                        onclick="downloadSummary()"
                        class="text-xs bg-white border border-slate-200 text-slate-600 font-semibold py-1.5 px-3 rounded-lg hover:bg-slate-50 cursor-pointer transition">
                        💾 Download .txt
                    </button>
                </div>
            </div>

            <div id="summaryText" class="text-slate-700 space-y-2 whitespace-pre-line text-sm leading-relaxed">
                {{ summary }}
            </div>
        </div>
        {% endif %}
    </div>

    <script>
        function copyToClipboard() {
            // Get the text inside our summary block
            const summaryText = document.getElementById("summaryText").innerText;
            const copyBtn = document.getElementById("copyBtn");

            // Use the browser's built-in navigator clipboard tool
            navigator.clipboard.writeText(summaryText).then(() => {
                // Instantly change button style/text to give visual confirmation
                copyBtn.innerText = "✅ Copied!";
                copyBtn.classList.add("bg-green-50", "text-green-600", "border-green-200");

                // Reset it back to normal after 2 seconds
                setTimeout(() => {
                    copyBtn.innerText = "📋 Copy";
                    copyBtn.classList.remove("bg-green-50", "text-green-600", "border-green-200");
                }, 2000);
            }).catch(err => {
                console.error("Failed to copy text: ", err);
            });
        }

        function downloadSummary() {
            const summaryText = document.getElementById("summaryText").innerText;
            
            // Create a virtual text file blob in browser memory
            const blob = new Blob([summaryText], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            
            // Create a hidden ghost link element to trigger the download window
            const a = document.createElement("a");
            a.href = url;
            a.download = "gemini-summary.txt";
            document.body.appendChild(a);
            a.click();
            
            // Clean up memory
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>

</body>
</html>
